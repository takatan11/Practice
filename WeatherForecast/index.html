<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeScript Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <!-- 検索フォーム -->
        <form class="search-form" id="search-form">
            <input type="text" id="city-input" placeholder="都市名を入力 (例: London)" required autocomplete="off">
            <button type="submit">検索</button>
        </form>

        <!-- 初期メッセージ -->
        <div class="info-text" id="info-text">
            都市を検索して天気予報を表示
        </div>

        <!-- ローディングスピナー (初期状態では非表示) -->
        <div class="loader" id="loader"></div>

        <!-- エラーメッセージ (初期状態では非表示) -->
        <div class="error-text" id="error-text"></div>

        <!-- 天気情報カード (初期状態では非表示) -->
        <div class="weather-card" id="weather-card">
            <h2 class="city-name" id="city-name">--</h2>
            <div class="weather-main">
                <img src="" alt="Weather Icon" class="weather-icon" id="weather-icon">
                <p class="temperature" id="temperature">--°C</p>
            </div>
            <p class="weather-description" id="weather-description">--</p>
            <div class="weather-details">
                <div>
                    <span class="label">湿度</span>
                    <span id="humidity">--%</span>
                </div>
                <div>
                    <span class="label">風速</span>
                    <span id="wind-speed">-- m/s</span>
                </div>
            </div>
        </div>
    </main>
    <script src="dist/main.js" type="module"></script>
</body>
</html>
